<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Headline Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; }
  body { font-family: Inter, sans-serif; background: #f7f3ec; color: #27272a; transition: background .3s; }
  body.dark { background: #000; color: #f4f4f5; }
  .bar { position: sticky; top: 0; z-index: 9; display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; backdrop-filter: blur(8px); background: rgba(247,243,236,.8); }
  body.dark .bar { background: rgba(0,0,0,.7); }
  .bar h1 { font-size: 14px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .bar button { font: inherit; padding: 8px 16px; border-radius: 999px; border: 1px solid rgba(39,39,42,.2); background: transparent; color: inherit; cursor: pointer; }
  body.dark .bar button { border-color: rgba(244,244,245,.25); }
  .cand { max-width: 720px; margin: 0 auto; padding: 64px 24px 56px; border-bottom: 1px solid rgba(39,39,42,.12); }
  body.dark .cand { border-color: rgba(244,244,245,.12); }
  .num { display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: .08em; padding: 4px 12px; border-radius: 999px; background: rgba(15,118,110,.12); color: #0f766e; margin-bottom: 20px; }
  body.dark .num { color: #2dd4bf; background: rgba(45,212,191,.12); }
  .big { font-family: Newsreader, serif; font-weight: 620; letter-spacing: -.02em; font-size: clamp(34px, 6vw, 52px); line-height: 1.08; color: #27272a; text-wrap: balance; }
  body.dark .big { color: #fafafa; }
  .teal { font-family: Newsreader, serif; font-weight: 600; letter-spacing: -.01em; font-size: clamp(21px, 3.4vw, 29px); margin-top: 12px; color: #0f766e; text-wrap: balance; }
  body.dark .teal { color: #2dd4bf; }
  .para { margin-top: 20px; font-size: 15px; line-height: 1.65; color: #52525b; max-width: 620px; }
  body.dark .para { color: #a1a1aa; }
  .kind { margin-top: 14px; font-size: 12px; color: #a1a1aa; letter-spacing: .03em; }
</style>
</head>
<body>
<div class="bar"><h1>Headline Lab · pick a number</h1><button onclick="document.body.classList.toggle('dark')">Toggle dark</button></div>
<div id="list"></div>
<script>
const para = "I'm John Adib, an engineering leader in London. 17+ years in, three verbs: I build, I teach, I mentor. Two startups, $1M raised, a million users in the first month, 1,200+ businesses served. 2,000+ students taught, 600+ mentorship sessions, and ADPList named me The World's Most Influential Mentor. The UK endorsed me as exceptional talent in technology. These days I build AI-first: changing how teams work, not just how fast they ship.";
const candidates = [
  ["I build. I teach. I mentor.", "It started with a keyboard and no computer.", "the current one, for comparison"],
  ["Teaching first, titles later.", "The titles came anyway.", "your own aphorism, plus a wink"],
  ["Still building, every single day.", "The next chapter is already in the works.", "present tense, both lines already yours"],
  ["AI isn't a tool choice. It's how the team works.", "Proven in production, not slides.", "your stance as the opening"],
  ["Changing how teams work. Not just how fast they ship.", "AI-first, in production, every day.", "your mission line promoted"],
  ["It started with a keyboard and no computer.", "Where it went is quite a story.", "the story hook leading"],
  ["From a blinking cursor to leading engineering in London.", "Every chapter raised the ceiling.", "the whole arc in one line"],
  ["My life runs in chapters.", "This one is AI-first.", "the chapter frame"],
  ["Building is the only job I ever wanted.", "It shows.", "love of craft, then confidence"],
  ["John Adib.", "Builder. Teacher. Mentor. AI-first.", "the name as the statement"],
  ["Hello. I'm John.", "Engineer, founder, mentor. Father of two, camera in hand.", "the warm classic"],
  ["Zero is where I do my best work.", "Two startups and a new country prove it.", "the restart superpower"],
];
document.getElementById("list").innerHTML = candidates.map(([big, teal, kind], i) =>
  `<section class="cand"><span class="num">Option ${i + 1}</span><div class="big">${big}</div><div class="teal">${teal}</div><p class="para">${para}</p><p class="kind">${kind}</p></section>`
).join("");
</script>
</body>
</html>
